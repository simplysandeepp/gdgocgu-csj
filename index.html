<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GDG Cloud Skills Leaderboard</title><link rel="icon" href="logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="container">
                <div class="header-content">
                    <div class="brand">
                        <img src="logo.png" alt="GDG Logo" class="brand-icon">
                        <div class="brand-text">
                            <h1>Cloud Skills Leaderboard</h1>
                            <p>GDG on Campus Galgotias University</p>
                        </div>
                    </div>
                    <div class="header-stats">
                        <div class="stat-item">
                            <span class="stat-number" id="totalUsers">0</span>
                            <span class="stat-label">Participants</span>
                        </div>
                        <div class="stat-divider"></div>
                        <div class="stat-item">
                            <span class="stat-number" id="completedUsers">0</span>
                            <span class="stat-label">Allocated</span>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <main class="main">
            <div class="container">
                <div class="controls">
                    <div class="search-wrapper">
                        <svg class="search-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                            <path d="M21 21l-4.35-4.35M10.8 18a7.2 7.2 0 1 1 0-14.4 7.2 7.2 0 0 1 0 14.4z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        <input id="searchInput" class="search-input" type="search" placeholder="Search participant name..." aria-label="Search participants">
                    </div>
                </div>

                <div class="leaderboard">
                    <div id="loadingState" class="loading">
                        <div class="loader"></div>
                        <p>Loading leaderboard...</p>
                    </div>

                    <div id="emptyState" class="empty" style="display: none;">
                        <svg class="empty-icon" viewBox="0 0 24 24" fill="none">
                            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
                            <path d="M8 15h8M9 9h.01M15 9h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                        <p>No participants found</p>
                    </div>

                    <div class="table-wrapper">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th class="th-rank">Rank</th>
                                    <th class="th-name">Participant</th>
                                    <th class="th-center">Goodies Allocation</th>
                                </tr>
                            </thead>
                            <tbody id="leaderboardBody">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>

        <footer class="footer">
            <div class="container">
                <p>Last updated: <span id="lastUpdated"></span></p>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
